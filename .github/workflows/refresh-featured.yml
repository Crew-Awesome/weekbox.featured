name: Refresh featured mods

on:
  schedule:
    - cron: '17,47 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: node scripts/generate-featured.mjs
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/featured.json public/featured-manifest.json
          git diff --cached --quiet && exit 0
          git commit -m 'Refresh featured mods'
          git push
